<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算法文档</title>

<!-- KaTeX CSS (math is rendered server-side by markdown-it-katex) -->
<link rel="stylesheet" href="/static/katex/katex.min.css">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════
   CSS Variables — Light & Dark
   ═══════════════════════════════════════════════════ */
:root[data-theme="light"] {
  --bg-root: #f6f5f1;
  --bg-sidebar: #eceae4;
  --bg-content: #fffef9;
  --bg-code: #f0eeea;
  --bg-code-block: #1e1e2e;
  --bg-table-head: #e8e5dd;
  --bg-table-stripe: #f8f7f3;
  --bg-search: #fff;
  --bg-toc: rgba(236,234,228,0.6);
  --bg-hover: rgba(0,0,0,0.04);
  --bg-active: rgba(180,80,40,0.08);
  --bg-badge: #e8e0d4;
  --border: #d8d4ca;
  --border-light: #e8e5dd;
  --text-primary: #1a1814;
  --text-secondary: #5c564a;
  --text-tertiary: #8a8478;
  --text-code: #c7402b;
  --accent: #b45028;
  --accent-soft: rgba(180,80,40,0.12);
  --accent-glow: rgba(180,80,40,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --scrollbar-thumb: #c4bfb4;
}

:root[data-theme="dark"] {
  --bg-root: #141218;
  --bg-sidebar: #1a181f;
  --bg-content: #1e1c24;
  --bg-code: #262430;
  --bg-code-block: #13111a;
  --bg-table-head: #262430;
  --bg-table-stripe: #1a181f;
  --bg-search: #262430;
  --bg-toc: rgba(26,24,31,0.8);
  --bg-hover: rgba(255,255,255,0.04);
  --bg-active: rgba(220,130,80,0.1);
  --bg-badge: #2a2636;
  --border: #2e2a38;
  --border-light: #262430;
  --text-primary: #e8e4f0;
  --text-secondary: #9a94a8;
  --text-tertiary: #6a6478;
  --text-code: #f0a070;
  --accent: #dc8250;
  --accent-soft: rgba(220,130,80,0.15);
  --accent-glow: rgba(220,130,80,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --scrollbar-thumb: #3a3648;
}

/* ═══════════════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-root);
  color: var(--text-primary);
  line-height: 1.7;
  overflow: hidden;
  height: 100vh;
}

::selection {
  background: var(--accent-soft);
  color: var(--accent);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ═══════════════════════════════════════════════════
   Layout — Three columns
   ═══════════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 280px 1fr 220px;
  height: 100vh;
  overflow: hidden;
  transition: grid-template-columns 0.3s ease;
}

.app.sidebar-collapsed {
  grid-template-columns: 0px 1fr 220px;
}

/* ═══════════════════════════════════════════════════
   Sidebar (left)
   ═══════════════════════════════════════════════════ */
.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease, opacity 0.3s ease;
  z-index: 100;
  position: relative;
}

.app.sidebar-collapsed .sidebar {
  opacity: 0;
  pointer-events: none;
}

/* Sidebar collapse toggle */
.sidebar-toggle {
  position: fixed;
  top: 50%;
  left: 280px;
  transform: translate(-50%, -50%);
  width: 24px;
  height: 48px;
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 0.75rem;
  z-index: 101;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-sm);
  padding: 0;
}

.sidebar-toggle:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--bg-search);
}

.sidebar-toggle svg {
  transition: transform 0.3s ease;
  width: 14px;
  height: 14px;
}

.app.sidebar-collapsed .sidebar-toggle {
  left: 0;
  border-radius: 0 8px 8px 0;
  transform: translate(0, -50%);
}

.app.sidebar-collapsed .sidebar-toggle svg {
  transform: rotate(180deg);
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.site-title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: 1.3rem;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.site-title .logo-mark {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}

.site-subtitle {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  margin-top: 4px;
  font-weight: 300;
  letter-spacing: 0.05em;
}

/* Search */
.search-box {
  padding: 10px 20px;
  flex-shrink: 0;
}

.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 10px;
  color: var(--text-tertiary);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 6px 12px 6px 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-search);
  color: var(--text-primary);
  font-size: 0.82rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.search-input::placeholder { color: var(--text-tertiary); }

.search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  max-height: 320px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}

.search-results.active { display: block; }

.search-result-item {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.15s;
}

.search-result-item:hover { background: var(--bg-hover); }
.search-result-item:last-child { border-bottom: none; }

.search-result-title {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.search-result-path {
  font-size: 0.68rem;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}

.search-result-snippet {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* Nav list */
.nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 20px;
  min-height: 0;
}

.nav-section-label {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  padding: 16px 8px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  border: none;
  background: none;
  text-align: left;
  font-family: inherit;
  padding: 9px 12px;
  padding-left: calc(12px + (var(--depth, 0) * 14px));
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.95rem;
  font-weight: 400;
  line-height: 1.4;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-active);
  color: var(--accent);
  font-weight: 600;
}

.nav-item .nav-icon {
  font-size: 1rem;
  flex-shrink: 0;
  width: 22px;
  text-align: center;
}

.nav-item .nav-icon.nav-icon-year {
  width: 38px;
  font-size: 0.8rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.nav-item .nav-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-folder {
  margin-bottom: 6px;
}

.nav-folder-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  padding-left: calc(8px + (var(--depth, 0) * 14px));
  color: var(--text-tertiary);
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s ease;
  position: relative;
}

.nav-folder-label:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.nav-folder-toggle {
  width: 12px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease;
  margin-right: -2px;
  font-size: 0.7rem;
  opacity: 0.6;
}

.nav-folder-toggle::after {
  content: '▶';
}

.nav-folder.expanded > .nav-folder-label .nav-folder-toggle::after {
  content: '▼';
}

.nav-folder-icon {
  width: 22px;
  text-align: center;
  opacity: 0.85;
  transition: opacity 0.2s ease;
}

.nav-folder-children {
  position: relative;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease;
  opacity: 0;
}

.nav-folder.expanded > .nav-folder-children {
  max-height: 5000px;
  opacity: 1;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}

.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.doc-count {
  font-size: 0.7rem;
  color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════════════
   Main Content
   ═══════════════════════════════════════════════════ */
.main {
  overflow-y: auto;
  scroll-behavior: smooth;
}

.content-wrap {
  max-width: 820px;
  margin: 0 auto;
}

/* Welcome */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  text-align: center;
  animation: fadeUp 0.6s ease;
}

.welcome-icon {
  font-size: 3.5rem;
  margin-bottom: 20px;
  opacity: 0.7;
}

.welcome h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.welcome p {
  color: var(--text-tertiary);
  font-size: 0.9rem;
  max-width: 400px;
}

.welcome .shortcut-hint {
  margin-top: 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-tertiary);
}

.kbd {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
}

/* ═══════════════════════════════════════════════════
   Article Markdown Styles
   ═══════════════════════════════════════════════════ */
.article {
  animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.article h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.article h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.45rem;
  font-weight: 700;
  margin: 56px 0 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  color: var(--text-primary);
  letter-spacing: -0.01em;
  position: relative;
}

.article h2 .tag-badges {
  float: right;
  display: inline-flex;
  gap: 6px;
  margin-left: 12px;
  position: relative;
  top: 2px;
}

.article h2 .tag-badge {
  display: inline-block;
  background: var(--bg-badge);
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55em;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  line-height: 1.6;
  letter-spacing: 0;
  white-space: nowrap;
}

.article h3 {
  font-size: 1.15rem;
  font-weight: 600;
  margin: 36px 0 14px;
  color: var(--text-primary);
}

.article h4 {
  font-size: 1rem;
  font-weight: 600;
  margin: 24px 0 10px;
  color: var(--text-secondary);
}

.article p {
  margin-bottom: 16px;
  color: var(--text-primary);
  font-size: 0.95rem;
}

.article .header-anchor {
  display: none;
}

.article h1:hover .header-anchor,
.article h2:hover .header-anchor,
.article h3:hover .header-anchor,
.article h4:hover .header-anchor {
  display: inline;
  color: var(--text-tertiary);
  text-decoration: none;
  margin-left: 8px;
  font-weight: 400;
  font-size: 0.7em;
  opacity: 0.5;
  transition: opacity 0.2s;
}

.article .header-anchor::after { content: "#"; }
.article .header-anchor:hover { opacity: 1; color: var(--accent); }

.article strong { font-weight: 700; color: var(--text-primary); }

.article ul, .article ol {
  margin: 0 0 16px 20px;
  font-size: 0.95rem;
}

.article li {
  margin-bottom: 6px;
  color: var(--text-primary);
}

.article li::marker { color: var(--accent); }

.article hr {
  display: none;
}

.article blockquote {
  border-left: 3px solid var(--accent);
  padding: 12px 20px;
  margin: 16px 0;
  background: var(--accent-glow);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* Inline code */
.inline-code {
  background: var(--bg-code);
  color: var(--text-code);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  font-weight: 500;
  word-break: break-word;
}

/* Code blocks */
.code-block {
  margin: 20px 0;
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg-code-block);
  box-shadow: var(--shadow-sm);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 14px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.code-lang {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.copy-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  padding: 2px;
  border-radius: 4px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
}

.copy-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.copy-btn.copied { color: #4ade80; }

.code-block pre {
  padding: 16px 18px;
  overflow-x: auto;
  margin: 0;
}

.code-block code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.65;
  tab-size: 4;
}

/* Tables */
.table-wrap {
  overflow-x: auto;
  margin: 20px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}

.table-wrap thead { background: var(--bg-table-head); }

.table-wrap th {
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}

.table-wrap td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-primary);
}

.table-wrap tbody tr:nth-child(even) { background: var(--bg-table-stripe); }
.table-wrap tbody tr:last-child td { border-bottom: none; }

/* ═══════════════════════════════════════════════════
   Right TOC Panel
   ═══════════════════════════════════════════════════ */
.toc-panel {
  border-left: 1px solid var(--border);
  background: var(--bg-root);
  overflow-y: auto;
  padding: 48px 16px 40px;
}

.toc-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  padding: 0 8px 10px;
}

.toc-list { list-style: none; }

.toc-item {
  display: block;
  padding: 4px 8px 4px 12px;
  font-size: 0.78rem;
  color: var(--text-tertiary);
  text-decoration: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.5;
  margin-bottom: 1px;
}

.toc-item:hover {
  color: var(--text-primary);
}

.toc-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}

.toc-item.level-3 { padding-left: 24px; font-size: 0.74rem; }

/* ═══════════════════════════════════════════════════
   Mobile hamburger
   ═══════════════════════════════════════════════════ */
.mobile-bar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  z-index: 200;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.hamburger {
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px;
}

.mobile-title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-primary);
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
}

/* ═══════════════════════════════════════════════════
   HiDPI code highlight colors (works on dark bg)
   ═══════════════════════════════════════════════════ */
.hljs { color: #c9d1d9; background: transparent; }
.hljs-keyword, .hljs-selector-tag { color: #ff7b72; }
.hljs-literal, .hljs-number { color: #79c0ff; }
.hljs-string, .hljs-doctag { color: #a5d6ff; }
.hljs-title, .hljs-section, .hljs-title.function_ { color: #d2a8ff; }
.hljs-built_in { color: #ffa657; }
.hljs-comment { color: #6a737d; font-style: italic; }
.hljs-type, .hljs-class .hljs-title { color: #7ee787; }
.hljs-attr, .hljs-attribute { color: #79c0ff; }
.hljs-meta { color: #d2a8ff; }
.hljs-variable, .hljs-template-variable { color: #ffa657; }
.hljs-params { color: #c9d1d9; }
.hljs-operator { color: #ff7b72; }
.hljs-punctuation { color: #8b949e; }

/* ═══════════════════════════════════════════════════

}

@media (max-width: 768px) {
  .mobile-bar { display: flex; }
  .sidebar-toggle { display: none; }
  .app {
    grid-template-columns: 1fr;

  .app.sidebar-collapsed { grid-template-columns: 1fr; }
  .sidebar {

  .sidebar-overlay.open { display: block; }
  .toc-panel { display: none; }
  .content-wrap { padding: 28px 20px 100px; }
  .progress-bar { left: 0; right: 0; top: 52px; }
  .article h1 { font-size: 1.5rem; }

}

/* ═══════════════════════════════════════════════════
   Back to top
   ═══════════════════════════════════════════════════ */
.back-to-top {
  position: fixed;
  bottom: 28px;
  right: 248px;
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-content);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
  z-index: 50;
}
.back-to-top:hover { border-color: var(--accent); color: var(--accent); }
.back-to-top.visible { display: flex; }

@media (max-width: 1100px) { .back-to-top { right: 28px; } }
@media (max-width: 768px) { .back-to-top { right: 20px; bottom: 20px; } }
</style>
</head>
<body>

<!-- Mobile bar -->
<div class="mobile-bar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="mobile-title">算法文档</span>
</div>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="app" id="app">
  <!-- Sidebar collapse toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleCollapse()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="site-title">
          <span class="logo-mark">DOC</span>
          <div>
          算法文档
          <div class="site-subtitle">ALGORITHM DOCUMENTS</div>
         </div>
       </div>
    </div>
    <div class="search-box">
      <div class="search-input-wrap">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索文档..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <nav class="nav-list" id="navList">
      <div class="nav-section-label">文档目录</div>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel" style="font-size:0.75rem;">暗色</span>
      </button>
      <span class="doc-count" id="docCount"></span>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="mainContent">
    <div class="progress-bar"><div class="bar" id="progressBar"></div></div>
    <div class="content-wrap" id="contentWrap">
      <div class="welcome">
        <div class="welcome-icon">📐</div>
        <h2>选择一篇文章开始阅读</h2>
        <p>左侧目录会展示 <code>docs/</code> 下的全部 Markdown 文档，并按目录层级组织。</p>
        <div class="shortcut-hint">
          按 <span class="kbd">Ctrl</span>+<span class="kbd">K</span> 搜索
        </div>
      </div>
    </div>
  </main>

  <!-- ── Right TOC ── -->
  <aside class="toc-panel" id="tocPanel">
    <div class="toc-title">本页目录</div>
    <div class="toc-list" id="tocList"></div>
  </aside>
</div>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>

<script>
// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let docs = [];
let folderMeta = {};
let currentSlug = null;
let searchTimer = null;
const APP_TITLE = '算法文档';

const SITE_BASE_PATH = (() => {
  const { pathname } = window.location;
  if (pathname.endsWith('/')) return pathname;
  const lastSegment = pathname.split('/').pop();
  if (lastSegment && !lastSegment.includes('.')) {
    return `${pathname}/`;
  }
  const lastSlash = pathname.lastIndexOf('/');
  return lastSlash === -1 ? '/' : pathname.slice(0, lastSlash + 1);
})();

function buildApiUrl(endpoint) {
  const base = new URL(SITE_BASE_PATH, window.location.origin);
  return new URL(endpoint.replace(/^\/+/, ''), base).toString();
}

async function getJson(endpoint) {
  const res = await fetch(buildApiUrl(endpoint));
  if (!res.ok) {
    throw new Error(`Request failed: ${res.status}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);

async function init() {
  document.title = APP_TITLE;

  // Theme
  const saved = localStorage.getItem('theme');
  if (saved) setTheme(saved);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');

  // Load docs list
  const payload = await getJson('api/docs');
  docs = Array.isArray(payload) ? payload : (payload.docs || []);
  folderMeta = Array.isArray(payload) ? {} : (payload.folders || {});
  renderNav();
  document.getElementById('docCount').textContent = `${docs.length} 篇`;

  // URL routing
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) loadDoc(hash);

  // Keyboard
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('searchInput').blur();
    }
  });
}

// ═══════════════════════════════════════════════════
//  Navigation
// ═══════════════════════════════════════════════════
function formatFolderName(name) {
  return name.replace(/[-_]+/g, ' ').trim() || name;
}

function getFolderMeta(path) {
  return folderMeta[path] || null;
}

function getFolderLabel(node) {
  return node.meta?.title || formatFolderName(node.name);
}

function getFolderIcon(node) {
  return node.meta?.icon || '📁';
}

function cleanTitle(title, meta) {
  if (meta?.title) return meta.title;
  let short = title
    .replace(/\r/g, '')
    .replace(/（.*?）/g, '')
    .replace(/\(.*?\)/g, '')
    .replace(/完全指南/g, '')
    .replace(/：.*$/g, '')
    .replace(/:.*$/g, '')
    .trim();
  if (!short) short = title;
  return short;
}

function getDocIcon(doc) {
  return doc.icon || '📄';
}

function getDocIconClass(doc) {
  return /^\d{4}$/.test(doc.icon || '') ? ' nav-icon-year' : '';
}

function buildDocTree(items) {
  const root = { type: 'folder', children: [] };

  items.forEach(doc => {
    const parts = doc.slug.split('/');
    const folders = parts.slice(0, -1);
    let current = root;
    let currentPath = '';

    folders.forEach(name => {
      currentPath = currentPath ? `${currentPath}/${name}` : name;
      let folder = current.children.find(node => node.type === 'folder' && node.name === name);
      if (!folder) {
        folder = {
          type: 'folder',
          name,
          path: currentPath,
          meta: getFolderMeta(currentPath),
          children: []
        };
        current.children.push(folder);
      } else if (!folder.meta) {
        folder.meta = getFolderMeta(currentPath);
      }
      current = folder;
    });

    current.children.push({ type: 'doc', doc, meta: getFolderMeta(doc.slug) });
  });

  return sortTreeNodes(root.children);
}

function getDocOrderValue(doc) {
  // Check folderMeta first (from _folders.json in the doc's directory)
  const metaOrder = folderMeta[doc.slug]?.order;
  if (typeof metaOrder === 'number' && Number.isFinite(metaOrder)) return metaOrder;
  const value = Number(doc.order);
  return Number.isFinite(value) ? value : null;
}

function getFolderOrderValue(folder) {
  const value = Number(folder.meta?.order);
  return Number.isFinite(value) ? value : null;
}

function getSlugNumberParts(slug) {
  const basename = slug.split('/').pop() || '';
  const match = basename.match(/^(\d+(?:\.\d+)*)/);
  return match ? match[1].split('.').map(part => Number.parseInt(part, 10)) : [];
}

function compareSlugNumberParts(aParts, bParts) {
  const minLength = Math.min(aParts.length, bParts.length);
  for (let i = 0; i < minLength; i += 1) {
    if (aParts[i] !== bParts[i]) {
      return aParts[i] - bParts[i];
    }
  }
  return aParts.length - bParts.length;
}

function sortTreeNodes(nodes) {
  return nodes
    .slice()
    .sort((a, b) => {
      if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;

      if (a.type === 'folder' && b.type === 'folder') {
        const orderA = getFolderOrderValue(a);
        const orderB = getFolderOrderValue(b);

        if (orderA !== null || orderB !== null) {
          if (orderA === null) return 1;
          if (orderB === null) return -1;
          if (orderA !== orderB) {
            return orderA - orderB;
          }
        }
      }

      if (a.type === 'doc' && b.type === 'doc') {
        const orderA = getDocOrderValue(a.doc);
        const orderB = getDocOrderValue(b.doc);

        if (orderA !== null || orderB !== null) {
          if (orderA === null) return 1;
          if (orderB === null) return -1;
          if (orderA !== orderB) {
            return orderA - orderB;
          }
        }

        const slugCompare = compareSlugNumberParts(
          getSlugNumberParts(a.doc.slug),
          getSlugNumberParts(b.doc.slug)
        );
        if (slugCompare !== 0) return slugCompare;

        return cleanTitle(a.doc.title, a.meta).localeCompare(cleanTitle(b.doc.title, b.meta), 'zh-CN');
      }

      const aLabel = a.type === 'folder' ? getFolderLabel(a) : cleanTitle(a.doc.title, a.meta);
      const bLabel = b.type === 'folder' ? getFolderLabel(b) : cleanTitle(b.doc.title, b.meta);
      return aLabel.localeCompare(bLabel, 'zh-CN');
    })
    .map(node => node.type === 'folder'
      ? { ...node, children: sortTreeNodes(node.children) }
      : node);
}

function renderTree(nodes, depth = 0) {
  return nodes.map(node => {
    if (node.type === 'folder') {
      const folderId = `folder-${node.path.replace(/[^a-zA-Z0-9]/g, '-')}`;
      return `
        <div class="nav-folder" data-folder-id="${folderId}">
          <div class="nav-folder-label" style="--depth:${depth}" onclick="toggleFolder('${folderId}')">
            <span class="nav-folder-toggle"></span>
            <span class="nav-folder-icon">${escapeHtml(getFolderIcon(node))}</span>
            <span>${escapeHtml(getFolderLabel(node))}</span>
          </div>
          <div class="nav-folder-children">${renderTree(node.children, depth + 1)}</div>
        </div>
      `;
    }

    const doc = node.doc;
    const short = cleanTitle(doc.title, node.meta);
    return `
      <button class="nav-item" style="--depth:${depth}" data-slug="${encodeURIComponent(doc.slug)}" title="${escapeAttribute(doc.title)}">
        <span class="nav-icon${getDocIconClass(doc)}">${getDocIcon(doc)}</span>
        <span class="nav-label">${escapeHtml(short)}</span>
      </button>
    `;
  }).join('');
}

function renderNav() {
  const nav = document.getElementById('navList');
  const tree = buildDocTree(docs);
  let html = '<div class="nav-section-label">文档目录</div>';
  html += renderTree(tree);
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item[data-slug]').forEach(el => {
    el.addEventListener('click', () => loadDoc(decodeURIComponent(el.dataset.slug)));
  });

  // Restore folder states after rendering
  setTimeout(restoreFolderStates, 0);
}

function setActiveNav(slug) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', decodeURIComponent(el.dataset.slug || '') === slug);
  });
}

// ═══════════════════════════════════════════════════
//  Load document
// ═══════════════════════════════════════════════════
async function loadDoc(slug) {
  currentSlug = slug;
  location.hash = encodeURIComponent(slug);
  setActiveNav(slug);

  const wrap = document.getElementById('contentWrap');
  wrap.innerHTML = '<div style="text-align:center;padding:80px 0;color:var(--text-tertiary)">加载中...</div>';

  const data = await getJson(`api/doc?path=${encodeURIComponent(slug)}`);

  wrap.innerHTML = `<div class="article">${data.html}</div>`;
  document.title = `${data.title} - ${APP_TITLE}`;

  // Intercept in-article anchor clicks so they scroll within the content
  wrap.querySelectorAll('.article a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const targetId = decodeURIComponent(a.getAttribute('href').slice(1));
      // Try exact match first, then fuzzy (strip punctuation)
      let el = document.getElementById(targetId);
      if (!el) {
        // Fuzzy: strip all non-word/non-CJK chars and compare
        const clean = s => s.replace(/[^\w\u4e00-\u9fff]/g, '').toLowerCase();
        const targetClean = clean(targetId);
        const headings = wrap.querySelectorAll('[id]');
        for (const h of headings) {
          if (clean(h.id) === targetClean) { el = h; break; }
        }
      }
      if (el) {
        const main = document.getElementById('mainContent');
        main.scrollTo({ top: el.offsetTop - 24, behavior: 'smooth' });
      }
    });
  });

  // Render TOC
  renderToc(data.toc);

  // Scroll to top
  document.getElementById('mainContent').scrollTop = 0;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');

  // Setup scroll spy
  setupScrollSpy();
}

// ═══════════════════════════════════════════════════
//  TOC
// ═══════════════════════════════════════════════════
function renderToc(toc) {
  const list = document.getElementById('tocList');
  if (!toc || toc.length === 0) {
    list.innerHTML = '<div style="font-size:0.75rem;color:var(--text-tertiary);padding:8px;">暂无目录</div>';
    return;
  }
  list.innerHTML = toc.map(item => {
    const cls = item.level === 3 ? 'toc-item level-3' : 'toc-item';
    const raw = item.html || escapeHtml(String(item.text || '').replace(/[*`]/g, ''));
    const content = raw.replace(/<a[^>]*>(.*?)<\/a>/gi, '$1');
    return `<a class="${cls}" data-id="${item.id}" onclick="scrollToHeading('${item.id}')">${content}</a>`;
  }).join('');
}

function scrollToHeading(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const main = document.getElementById('mainContent');
  const top = el.offsetTop - 24;
  main.scrollTo({ top, behavior: 'smooth' });
}

function setupScrollSpy() {
  const main = document.getElementById('mainContent');
  let prevActiveId = '';
  main.onscroll = () => {
    const tocItems = document.querySelectorAll('.toc-item');
    const scrollTop = main.scrollTop;
    const mainRect = main.getBoundingClientRect();
    const headings = document.querySelectorAll('.article h2, .article h3');
    let activeId = '';

    headings.forEach(h => {
      const rect = h.getBoundingClientRect();
      if (rect.top - mainRect.top <= 80) {
        activeId = h.id;
      }
    });

    tocItems.forEach(item => {
      const isActive = item.dataset.id === activeId;
      item.classList.toggle('active', isActive);
    });

    if (activeId && activeId !== prevActiveId) {
      prevActiveId = activeId;
      const activeEl = document.querySelector(`.toc-item[data-id="${activeId}"]`);
      if (activeEl) {
        const panel = document.getElementById('tocPanel');
        const panelRect = panel.getBoundingClientRect();
        const elRect = activeEl.getBoundingClientRect();
        if (elRect.top < panelRect.top || elRect.bottom > panelRect.bottom) {
          panel.scrollTop += elRect.top - panelRect.top - panelRect.height / 3;
        }
      }
    }

    // Progress bar
    const scrollHeight = main.scrollHeight - main.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    document.getElementById('progressBar').style.width = pct + '%';

    // Back to top
    document.getElementById('backToTop').classList.toggle('visible', scrollTop > 400);
  };
  main.onscroll();
}

function scrollToTop() {
  document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════
//  Sidebar collapse
// ═══════════════════════════════════════════════════
function toggleCollapse() {
  const app = document.getElementById('app');
  const toggle = document.getElementById('sidebarToggle');
  app.classList.toggle('sidebar-collapsed');
  const collapsed = app.classList.contains('sidebar-collapsed');
  localStorage.setItem('sidebar-collapsed', collapsed);
  // Update progress bar position
  const progressBar = document.querySelector('.progress-bar');
  if (progressBar) {
    progressBar.style.left = collapsed ? '0' : '280px';
  }
  // Update toggle position
  toggle.style.left = collapsed ? '0px' : '280px';
}

// Restore sidebar state
(function() {
  if (localStorage.getItem('sidebar-collapsed') === 'true') {
    const app = document.getElementById('app');
    const toggle = document.getElementById('sidebarToggle');
    app.classList.add('sidebar-collapsed');
    const progressBar = document.querySelector('.progress-bar');
    if (progressBar) progressBar.style.left = '0';
    toggle.style.left = '0px';
  }
})();

// ═══════════════════════════════════════════════════
//  Search
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = input.value.trim();
    if (!q) { results.classList.remove('active'); return; }
    searchTimer = setTimeout(async () => {
      const data = await getJson(`api/search?q=${encodeURIComponent(q)}`);
      if (!data.length) {
        results.innerHTML = '<div style="padding:14px;color:var(--text-tertiary);font-size:0.82rem;text-align:center;">未找到结果</div>';
      } else {
        results.innerHTML = data.map(r => `
          <div class="search-result-item" data-slug="${encodeURIComponent(r.slug)}">
            <div class="search-result-title">${escapeHtml(r.title)}</div>
            <div class="search-result-path">${escapeHtml(r.section || '根目录')}</div>
            <div class="search-result-snippet">${escapeHtml(r.snippet)}</div>
          </div>
        `).join('');
        results.querySelectorAll('.search-result-item[data-slug]').forEach(item => {
          item.addEventListener('click', () => {
            loadDoc(decodeURIComponent(item.dataset.slug));
            results.classList.remove('active');
            input.value = '';
          });
        });
      }
      results.classList.add('active');
    }, 250);
  });

  input.addEventListener('blur', () => {
    setTimeout(() => results.classList.remove('active'), 200);
  });
});

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function escapeAttribute(text) {
  return escapeHtml(text).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ═══════════════════════════════════════════════════
//  Theme
// ═══════════════════════════════════════════════════
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (theme === 'dark') {
    icon.textContent = '☀️';
    label.textContent = '亮色';
  } else {
    icon.textContent = '🌙';
    label.textContent = '暗色';
  }
}

// ═══════════════════════════════════════════════════
//  Mobile sidebar
// ═══════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}

// ═══════════════════════════════════════════════════
//  Copy code
// ═══════════════════════════════════════════════════
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    }, 1500);
  });
}

// ═══════════════════════════════════════════════════
//  Folder collapse functionality
// ═══════════════════════════════════════════════════
function toggleFolder(folderId) {
  const folder = document.querySelector(`[data-folder-id="${folderId}"]`);
  if (!folder) return;

  folder.classList.toggle('expanded');

  // Save folder states to localStorage
  saveFolderStates();
}

function saveFolderStates() {
  const expandedFolders = [];
  document.querySelectorAll('.nav-folder.expanded').forEach(folder => {
    expandedFolders.push(folder.dataset.folderId);
  });
  localStorage.setItem('expanded-folders', JSON.stringify(expandedFolders));
}

function restoreFolderStates() {
  try {
    const expandedFolders = JSON.parse(localStorage.getItem('expanded-folders') || '[]');
    expandedFolders.forEach(folderId => {
      const folder = document.querySelector(`[data-folder-id="${folderId}"]`);
      if (folder) {
        folder.classList.add('expanded');
      }
    });
  } catch (e) {
    console.warn('Failed to restore folder states:', e);
  }
}
</script>
</body>
</html>
